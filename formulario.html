<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formulario</title>
    <link rel="stylesheet" href="form.css">
</head>

<body>
    <div class="form-container">
        <h1>Novo Poema</h1>
        <form id="poema_form">
            <label>Titulo</label>
            <input type="text" id="titulo" required />
            <label>Autor</label>
            <input type="text" id="autor" required />
            <label>Imagem</label>
            <input type="file" id="imagem" accept="image/*" />
            <label>Poema</label>
            <textarea id="poema" required></textarea>
            <label>O que estava pensando enquanto escrevia</label>
            <textarea id="pensamento"></textarea>
            <label>Ideia do poema</label>
            <textarea id="ideia"></textarea>
            <button type="submit">Enviar poema</button>
        </form>

    </div>
    <script type="module" src="form.js"></script>
</body>

</html>
